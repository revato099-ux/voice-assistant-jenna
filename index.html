<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 JENNA - Ovozli Yordamchi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(30, 30, 30, 0.95);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #1E90FF, #00CED1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 14px;
            color: #90EE90;
        }
        .status {
            background: rgba(0, 206, 209, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin: 15px 0;
            font-size: 18px;
            color: #90EE90;
            font-weight: bold;
            min-height: 25px;
            border-left: 4px solid #00CED1;
        }
        .response-box {
            background: rgba(30, 144, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            min-height: 60px;
            max-height: 200px;
            overflow-y: auto;
            border-left: 4px solid #1E90FF;
        }
        .response-text {
            font-size: 15px;
            color: #B3B3B3;
            line-height: 1.5;
        }
        .user-text {
            background: rgba(144, 238, 144, 0.1);
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #90EE90;
            font-weight: bold;
            color: #90EE90;
        }
        .ai-text {
            background: rgba(30, 144, 255, 0.05);
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #1E90FF;
            color: #B3B3B3;
        }
        button {
            background: linear-gradient(135deg, #1E90FF, #00CED1);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin: 15px 0;
            transition: 0.3s;
            font-weight: bold;
        }
        button:active { 
            transform: scale(0.98);
            opacity: 0.8;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .settings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 14px;
        }
        input[type="text"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            flex: 1;
            margin-left: 10px;
        }
        .keywords {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.8;
        }
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #1E90FF;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 JENNA</h1>
            <p class="subtitle">Ovozli Yordamchi + AI</p>
        </div>

        <div class="status">Tayyor</div>

        <div class="response-box">
            <div class="response-text">
                <div style="text-align: center; color: #888;">Salom! Men JENNA. Sizga qanday yordam bera olamiz?</div>
            </div>
        </div>

        <button onclick="startListening()" id="listenBtn">🎤 Tinglashni boshlash</button>

        <div class="settings">
            <div class="setting-item">
                <label for="apiKey">OpenAI API Key:</label>
                <input type="text" id="apiKey" placeholder="sk-..." style="width: 150px;">
            </div>
            <div style="font-size: 11px; color: #666; margin-top: 5px;">
                🔐 API key telefonadondan saqlanadi (offline)
            </div>
        </div>

        <div class="keywords">
            <strong>✨ Imkoniyatlar:</strong><br>
            • Savollarga javob berish<br>
            • Hisob-kitoblar<br>
            • Tarjima qilish<br>
            • Maslahat berish<br>
            • Qo'shiqlar topish<br>
            • Va boshqa...
        </div>
    </div>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'uz-UZ';
        let isListening = false;

        function startListening() {
            if (isListening) return;
            isListening = true;
            updateStatus('Tingyapman...', '#1E90FF');
            document.getElementById('listenBtn').disabled = true;
            recognition.start();
        }

        function updateStatus(text, color = '#90EE90') {
            document.querySelector('.status').textContent = text;
            document.querySelector('.status').style.color = color;
        }

        function addResponseMessage(text, type = 'ai') {
            const responseBox = document.querySelector('.response-text');
            const div = document.createElement('div');
            div.className = type === 'user' ? 'user-text' : 'ai-text';
            div.textContent = text;
            responseBox.appendChild(div);
            responseBox.parentElement.scrollTop = responseBox.parentElement.scrollHeight;
        }

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            addResponseMessage('Siz: ' + text, 'user');
            updateStatus('Javob tayyorlanmoqda...', '#00CED1');
            
            // ChatGPT-ga yuborish
            const response = await getChatGPTResponse(text);
            if (response) {
                addResponseMessage(response, 'ai');
                updateStatus('Tayyor ✓', '#90EE90');
                
                // Text-to-speech
                speak(response);
            } else {
                updateStatus('Xato yuz berdi', '#FF6B6B');
            }
        };

        recognition.onend = () => {
            isListening = false;
            document.getElementById('listenBtn').disabled = false;
        };

        async function getChatGPTResponse(userMessage) {
            const apiKey = document.getElementById('apiKey').value;
            
          
                        
                       
                            
                        
                        
                        
                    
                              alert('OpenAI API key kiriting!');
                return null;
            }

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4',
                        messages: [
                            { role: 'system', content: 'Siz JENNA - o\'zbek tilida yordam beradigan AI. Qisqa va aniq javoblar bering.' },
                            { role: 'user', content: userMessage }
                        ],
                        temperature: 0.7,
                        max_tokens: 150
                    })
                });

                if (!response.ok) {
                    console.error('API Error:', response.status);
                    return 'API xatosi yuz berdi. Iltimos, API key-ni tekshiring.';
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('Error:', error);
                return 'Tarmoq xatosi yuz berdi.';
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uz-UZ';
            utterance.rate = 0.9;
            synth.speak(utterance);
        }

        recognition.onerror = (event) => {
            updateStatus('Xato: ' + event.error, '#FF6B6B');
            isListening = false;
            document.getElementById('listenBtn').disabled = false;
        };
    </script>
</body>
</html>
