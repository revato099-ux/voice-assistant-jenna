<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 JENNA - Ovozli Yordamchi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(20, 20, 30, 0.95);
            padding: 35px;
            border-radius: 25px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(100, 200, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #64c8ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .subtitle {
            font-size: 15px;
            color: #90EE90;
            font-weight: 500;
        }
        .status {
            background: rgba(0, 212, 255, 0.15);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
            color: #64c8ff;
            font-weight: bold;
            min-height: 28px;
            border-left: 5px solid #00d4ff;
        }
        .response-box {
            background: rgba(100, 200, 255, 0.08);
            padding: 18px;
            border-radius: 12px;
            margin: 20px 0;
            min-height: 80px;
            max-height: 220px;
            overflow-y: auto;
            border-left: 5px solid #64c8ff;
        }
        .response-text {
            font-size: 15px;
            color: #b0b0b0;
            line-height: 1.6;
        }
        .user-text {
            background: rgba(144, 238, 144, 0.12);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #90EE90;
            font-weight: 600;
            color: #90EE90;
        }
        .ai-text {
            background: rgba(100, 200, 255, 0.08);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #64c8ff;
            color: #b0b0b0;
        }
        button {
            background: linear-gradient(135deg, #64c8ff, #00d4ff);
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
            transition: all 0.3s ease;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(100, 200, 255, 0.3);
        }
        button:active { 
            transform: scale(0.97);
            opacity: 0.85;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .settings {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid rgba(100, 200, 255, 0.2);
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 14px;
        }
        input[type="text"] {
            background: rgba(100, 200, 255, 0.08);
            border: 2px solid rgba(100, 200, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            flex: 1;
            margin-left: 12px;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #64c8ff;
            background: rgba(100, 200, 255, 0.15);
            box-shadow: 0 0 12px rgba(100, 200, 255, 0.3);
        }
        .keywords {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(100, 200, 255, 0.2);
            line-height: 1.9;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(100, 200, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 200, 255, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 JENNA</h1>
            <p class="subtitle">Ovozli Yordamchi + AI (GROQ)</p>
        </div>

        <div class="status">Tayyor ✓</div>

        <div class="response-box">
            <div class="response-text">
                <div style="text-align: center; color: #888;">Salom! Men JENNA. Sizga qanday yordam bera olamiz?</div>
            </div>
        </div>

        <button onclick="startListening()" id="listenBtn">🎤 Tinglashni boshlash</button>

        <div class="settings">
            <div class="setting-item">
                <label for="apiKey">GROQ API Key:</label>
                <input type="text" id="apiKey" value="r8_76McOeL1usWgd4VfiDiOfK761bVej8Q1ZhGEH" style="width: 160px; font-size: 12px;">
            </div>
            <div style="font-size: 11px; color: #666; margin-top: 8px;">
                🔐 API key telefonadondan saqlanadi (offline)
            </div>
        </div>

        <div class="keywords">
            <strong>✨ Imkoniyatlar:</strong><br>
            • Savollarga javob berish<br>
            • Hisob-kitoblar<br>
            • Tarjima qilish<br>
            • Maslahat berish<br>
            • Qo'shiqlar topish<br>
            • Va boshqa...
        </div>
    </div>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'uz-UZ';
        let isListening = false;

        function startListening() {
            if (isListening) return;
            isListening = true;
            updateStatus('Tingyapman...', '#64c8ff');
            document.getElementById('listenBtn').disabled = true;
            recognition.start();
        }

        function updateStatus(text, color = '#90EE90') {
            document.querySelector('.status').textContent = text;
            document.querySelector('.status').style.color = color;
        }

        function addResponseMessage(text, type = 'ai') {
            const responseBox = document.querySelector('.response-text');
            const div = document.createElement('div');
            div.className = type === 'user' ? 'user-text' : 'ai-text';
            div.textContent = text;
            responseBox.appendChild(div);
            responseBox.parentElement.scrollTop = responseBox.parentElement.scrollHeight;
        }

        recognition.onresult = async (event) => {
            const text = event.results[0][0].transcript;
            addResponseMessage('Siz: ' + text, 'user');
            updateStatus('Javob tayyorlanmoqda...', '#00d4ff');
            
            const response = await getGROQResponse(text);
            if (response) {
                addResponseMessage(response, 'ai');
                updateStatus('Tayyor ✓', '#90EE90');
                speak(response);
            } else {
                updateStatus('Xato yuz berdi', '#FF6B6B');
            }
        };

        recognition.onend = () => {
            isListening = false;
            document.getElementById('listenBtn').disabled = false;
        };

        async function getGROQResponse(userMessage) {
            const apiKey = document.getElementById('apiKey').value;
            
            if (!apiKey || apiKey === 'r8_76McOeL1usWgd4VfiDiOfK761bVej8Q1ZhGEH') {
                alert('GROQ API key kiriting!');
                return null;
            }

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'mixtral-8x7b-32768',
                        messages: [
                            { role: 'system', content: 'Siz JENNA - o\'zbek tilida yordam beradigan AI. Qisqa va aniq javoblar bering (100-150 soʻz).' },
                            { role: 'user', content: userMessage }
                        ],
                        temperature: 0.7,
                        max_tokens: 150
                    })
                });

                if (!response.ok) {
                    console.error('API Error:', response.status);
                    return 'API xatosi yuz berdi. API key-ni tekshiring.';
                }

                const data = await response.json();
                return data.choices[0].message.content.trim();
            } catch (error) {
                console.error('Error:', error);
                return 'Tarmoq xatosi yuz berdi.';
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'uz-UZ';
            utterance.rate = 0.9;
            synth.speak(utterance);
        }

        recognition.onerror = (event) => {
            updateStatus('Xato: ' + event.error, '#FF6B6B');
            isListening = false;
            document.getElementById('listenBtn').disabled = false;
        };
    </script>
</body>
</html>
